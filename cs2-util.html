<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>CS2 UTIL</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #111116;
    --card: #18181f;
    --border: #25252f;
    --accent: #f5a623;
    --smoke: #7eb8d4;
    --flash: #f5e642;
    --molotov: #e84040;
    --he: #4de88a;
    --text: #e8e8f0;
    --muted: #666680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; overflow: hidden; }

  /* HEADER */
  header { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; background: var(--panel); border-bottom: 1px solid var(--border); }
  .logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 2px; color: var(--accent); }
  .logo span { color: var(--text); }
  .back-btn { display: none; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 6px 14px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 14px; cursor: pointer; letter-spacing: 1px; }

  /* MAIN LAYOUT */
  .screen { display: none; flex-direction: column; height: calc(100vh - 53px); overflow: hidden; }
  .screen.active { display: flex; }

  /* MAP SELECT */
  #screen-maps { padding: 16px; gap: 12px; overflow-y: auto; }
  .section-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .map-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; cursor: pointer; transition: all 0.15s; position: relative; aspect-ratio: 16/9; display: flex; align-items: flex-end; }
  .map-card:active { transform: scale(0.97); border-color: var(--accent); }
  .map-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 60px; opacity: 0.15; }
  .map-label { position: relative; z-index: 1; width: 100%; padding: 10px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.85)); }
  .map-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
  .map-sub { font-size: 10px; color: var(--muted); letter-spacing: 1px; }

  /* NADE TYPE SELECT */
  #screen-types { padding: 16px; gap: 12px; overflow-y: auto; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px 14px; cursor: pointer; transition: all 0.15s; display: flex; flex-direction: column; align-items: center; gap: 8px; }
  .type-card:active { transform: scale(0.97); }
  .type-icon { font-size: 32px; }
  .type-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 18px; letter-spacing: 1px; }
  .type-count { font-size: 11px; color: var(--muted); }
  .type-card.smoke { border-color: var(--smoke); }
  .type-card.smoke .type-name { color: var(--smoke); }
  .type-card.flash { border-color: var(--flash); }
  .type-card.flash .type-name { color: var(--flash); }
  .type-card.molotov { border-color: var(--molotov); }
  .type-card.molotov .type-name { color: var(--molotov); }
  .type-card.he { border-color: var(--he); }
  .type-card.he .type-name { color: var(--he); }

  /* NADE LIST */
  #screen-list { padding: 0; overflow-y: auto; }
  .nade-list { padding: 12px 16px; display: flex; flex-direction: column; gap: 8px; }
  .nade-item { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 14px 16px; cursor: pointer; transition: all 0.15s; display: flex; align-items: center; gap: 12px; }
  .nade-item:active { transform: scale(0.98); }
  .nade-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .nade-dot.smoke { background: var(--smoke); }
  .nade-dot.flash { background: var(--flash); }
  .nade-dot.molotov { background: var(--molotov); }
  .nade-dot.he { background: var(--he); }
  .nade-info { flex: 1; }
  .nade-title { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 17px; letter-spacing: 0.5px; }
  .nade-desc { font-size: 12px; color: var(--muted); margin-top: 2px; }
  .nade-arrow { color: var(--muted); font-size: 18px; }
  .difficulty { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; margin-top: 4px; }
  .diff-easy { background: #0d3320; color: var(--he); }
  .diff-medium { background: #332d00; color: var(--flash); }
  .diff-hard { background: #330d0d; color: var(--molotov); }

  /* VIDEO SCREEN */
  #screen-video { overflow-y: auto; }
  .video-container { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
  .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; }
  .video-info { padding: 16px; }
  .video-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.5px; margin-bottom: 6px; }
  .video-tags { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .tag-map { background: #1a1a2e; color: #8888ff; }
  .tag-type { font-family: 'Rajdhani', sans-serif; font-weight: 600; }
  .tag-type.smoke { background: #0d1f2e; color: var(--smoke); }
  .tag-type.flash { background: #2e2a00; color: var(--flash); }
  .tag-type.molotov { background: #2e0d0d; color: var(--molotov); }
  .tag-type.he { background: #0d2e1a; color: var(--he); }
  .tip-box { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 8px; padding: 12px 14px; font-size: 13px; color: #aaa; line-height: 1.6; }
  .tip-box strong { color: var(--accent); display: block; margin-bottom: 4px; font-family: 'Rajdhani', sans-serif; font-size: 14px; letter-spacing: 1px; }

  /* BREADCRUMB */
  .breadcrumb { padding: 10px 16px; font-size: 12px; color: var(--muted); border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 6px; background: var(--panel); }
  .breadcrumb span { color: var(--text); }

  @keyframes slideIn { from { opacity: 0; transform: translateX(20px); } to { opacity: 1; transform: translateX(0); } }
  .screen.active { animation: slideIn 0.2s ease; }
</style>
</head>
<body>

<header>
  <div class="logo">CS2<span>UTIL</span></div>
  <button class="back-btn" id="back-btn" onclick="goBack()">← VOLVER</button>
</header>

<!-- SCREEN 1: MAPAS -->
<div class="screen active" id="screen-maps">
  <div class="section-label">Seleccioná el mapa</div>
  <div class="map-grid">
    <div class="map-card" onclick="selectMap('mirage')" style="background: linear-gradient(135deg, #1a1208, #2a1f0a)">
      <div class="map-bg">🏛️</div>
      <div class="map-label"><div class="map-name">MIRAGE</div><div class="map-sub">MID • A SITE • B SITE</div></div>
    </div>
    <div class="map-card" onclick="selectMap('nuke')" style="background: linear-gradient(135deg, #080f1a, #0a1a10)">
      <div class="map-bg">☢️</div>
      <div class="map-label"><div class="map-name">NUKE</div><div class="map-sub">UPPER • LOWER • OUTSIDE</div></div>
    </div>
    <div class="map-card" onclick="selectMap('inferno')" style="background: linear-gradient(135deg, #1a0808, #2a1008)">
      <div class="map-bg">🔥</div>
      <div class="map-label"><div class="map-name">INFERNO</div><div class="map-sub">BANANA • A SITE • MID</div></div>
    </div>
    <div class="map-card" onclick="selectMap('dust2')" style="background: linear-gradient(135deg, #1a1508, #2a200a)">
      <div class="map-bg">🏜️</div>
      <div class="map-label"><div class="map-name">DUST 2</div><div class="map-sub">LONG • MID • B SITE</div></div>
    </div>
  </div>
</div>

<!-- SCREEN 2: TIPO DE GRANADA -->
<div class="screen" id="screen-types">
  <div class="section-label" id="types-label">Tipo de granada</div>
  <div class="type-grid">
    <div class="type-card smoke" onclick="selectType('smoke')">
      <div class="type-icon">💨</div>
      <div class="type-name">HUMO</div>
      <div class="type-count" id="count-smoke">— lineups</div>
    </div>
    <div class="type-card flash" onclick="selectType('flash')">
      <div class="type-icon">⚡</div>
      <div class="type-name">FLASH</div>
      <div class="type-count" id="count-flash">— lineups</div>
    </div>
    <div class="type-card molotov" onclick="selectType('molotov')">
      <div class="type-icon">🔥</div>
      <div class="type-name">MOLOTOV</div>
      <div class="type-count" id="count-molotov">— lineups</div>
    </div>
    <div class="type-card he" onclick="selectType('he')">
      <div class="type-icon">💣</div>
      <div class="type-name">HE</div>
      <div class="type-count" id="count-he">— lineups</div>
    </div>
  </div>
</div>

<!-- SCREEN 3: LISTA -->
<div class="screen" id="screen-list">
  <div class="breadcrumb" id="breadcrumb-list"></div>
  <div class="nade-list" id="nade-list"></div>
</div>

<!-- SCREEN 4: VIDEO -->
<div class="screen" id="screen-video">
  <div class="video-container">
    <iframe id="yt-player" src="" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
  </div>
  <div class="video-info">
    <div class="video-title" id="vid-title"></div>
    <div class="video-tags" id="vid-tags"></div>
    <div class="tip-box">
      <strong>💡 CÓMO EJECUTAR</strong>
      <span id="vid-tip"></span>
    </div>
  </div>
</div>

// ─── STATE ───────────────────────────────────────────────────────────────────
let currentMap = null, currentType = null;
const history = [];

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('back-btn').style.display = history.length > 0 ? 'block' : 'none';
}

function goBack() {
  if (history.length === 0) return;
  const prev = history.pop();
  if (prev === 'maps') { currentMap = null; showScreen('maps'); }
  else if (prev === 'types') { showScreen('types'); }
  else if (prev === 'list') { showScreen('list'); }
  document.getElementById('back-btn').style.display = history.length > 0 ? 'block' : 'none';
  // Stop video
  document.getElementById('yt-player').src = '';
}

function selectMap(map) {
  history.push('maps');
  currentMap = map;
  const mapNames = { mirage: 'MIRAGE', nuke: 'NUKE', inferno: 'INFERNO', dust2: 'DUST 2' };
  document.getElementById('types-label').textContent = mapNames[map] + ' — Tipo de granada';
  const types = ['smoke','flash','molotov','he'];
  types.forEach(t => {
    const count = DATA[map][t] ? DATA[map][t].length : 0;
    document.getElementById('count-' + t).textContent = count + ' lineups';
  });
  showScreen('types');
}

function selectType(type) {
  history.push('types');
  currentType = type;
  const mapNames = { mirage: 'Mirage', nuke: 'Nuke', inferno: 'Inferno', dust2: 'Dust 2' };
  const typeNames = { smoke: '💨 Humos', flash: '⚡ Flashes', molotov: '🔥 Molotovs', he: '💣 HEs' };
  document.getElementById('breadcrumb-list').innerHTML = `${mapNames[currentMap]} <span>›</span> <span>${typeNames[type]}</span>`;
  const nades = DATA[currentMap][type] || [];
  const list = document.getElementById('nade-list');
  list.innerHTML = nades.map((n, i) => `
    <div class="nade-item" onclick="openNade(${i})">
      <div class="nade-dot ${type}"></div>
      <div class="nade-info">
        <div class="nade-title">${n.title}</div>
        <div class="nade-desc">${n.desc}</div>
        <span class="difficulty diff-${n.diff}">${n.diff === 'easy' ? '● Fácil' : n.diff === 'medium' ? '● Medio' : '● Difícil'}</span>
      </div>
      <div class="nade-arrow">›</div>
    </div>`).join('');
  showScreen('list');
}

function openNade(i) {
  history.push('list');
  const nade = DATA[currentMap][currentType][i];
  const mapNames = { mirage: 'Mirage', nuke: 'Nuke', inferno: 'Inferno', dust2: 'Dust 2' };
  const typeNames = { smoke: 'Humo', flash: 'Flash', molotov: 'Molotov', he: 'HE' };
  document.getElementById('vid-title').textContent = nade.title;
  document.getElementById('vid-tags').innerHTML = `
    <span class="tag tag-map">${mapNames[currentMap]}</span>
    <span class="tag tag-type ${currentType}">${typeNames[currentType]}</span>
    <span class="difficulty diff-${nade.diff}">${nade.diff === 'easy' ? '● Fácil' : nade.diff === 'medium' ? '● Medio' : '● Difícil'}</span>`;
  document.getElementById('vid-tip').textContent = nade.tip;
  document.getElementById('yt-player').src = `https://www.youtube.com/embed/${nade.vid}?autoplay=1&rel=0`;
  showScreen('video');
}
</script>
</body>
</html>
