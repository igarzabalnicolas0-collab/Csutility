<head>
<meta charset="UTF-8">

<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="CS2UTIL">

<title>CS2 UTIL</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0c;
    --panel: #111116;
    --card: #18181f;
    --border: #25252f;
    --accent: #f5a623;
    --smoke: #7eb8d4;
    --flash: #f5e642;
    --molotov: #e84040;
    --he: #4de88a;
    --text: #e8e8f0;
    --muted: #666680;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { height: 100%; }
  body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; height: 100%; overflow: hidden; display: flex; flex-direction: column; }

  /* HEADER */
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px;
    padding-top: max(14px, env(safe-area-inset-top));
    background: var(--panel); border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .logo { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 3px; color: var(--accent); }
  .logo span { color: var(--text); }
  .back-btn { display: none; align-items: center; gap: 6px; background: var(--card); border: 1px solid var(--border); border-radius: 8px; padding: 7px 14px; color: var(--text); font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 15px; cursor: pointer; letter-spacing: 1px; }
  .back-btn.visible { display: flex; }
  .breadcrumb-header { font-size: 12px; color: var(--muted); font-family: 'Rajdhani', sans-serif; letter-spacing: 1px; }
  .breadcrumb-header span { color: var(--accent); }

  /* SCREENS */
  .screen { display: none; flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .screen.active { display: block; }

  /* ── MAP SELECT ── */
  #screen-maps { padding: 16px; }
  .section-label { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 11px; letter-spacing: 3px; color: var(--muted); text-transform: uppercase; margin-bottom: 10px; }
  .map-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .map-card { border-radius: 14px; overflow: hidden; cursor: pointer; position: relative; aspect-ratio: 16/9; display: flex; align-items: flex-end; border: 1px solid var(--border); transition: transform 0.12s; }
  .map-card:active { transform: scale(0.96); }
  .map-emoji { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 52px; opacity: 0.18; }
  .map-label { position: relative; z-index: 1; width: 100%; padding: 10px 12px; background: linear-gradient(transparent, rgba(0,0,0,0.9)); }
  .map-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 20px; letter-spacing: 1px; }
  .map-sub { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; margin-top: 1px; }

  /* ── TYPE SELECT ── */
  #screen-types { padding: 16px; }
  .type-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .type-card { background: var(--card); border: 2px solid var(--border); border-radius: 14px; padding: 22px 14px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; transition: transform 0.12s, border-color 0.12s; }
  .type-card:active { transform: scale(0.96); }
  .type-icon { font-size: 34px; }
  .type-name { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 19px; letter-spacing: 1px; }
  .type-count { font-size: 11px; color: var(--muted); }
  .type-card.smoke { border-color: var(--smoke); } .type-card.smoke .type-name { color: var(--smoke); }
  .type-card.flash { border-color: var(--flash); } .type-card.flash .type-name { color: var(--flash); }
  .type-card.molotov { border-color: var(--molotov); } .type-card.molotov .type-name { color: var(--molotov); }
  .type-card.he { border-color: var(--he); } .type-card.he .type-name { color: var(--he); }

  /* ── NADE LIST ── */
  #screen-list { padding: 12px 16px; }
  .nade-item { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 14px 16px; cursor: pointer; display: flex; align-items: center; gap: 12px; margin-bottom: 8px; transition: transform 0.12s, border-color 0.12s; }
  .nade-item:active { transform: scale(0.98); border-color: var(--accent); }
  .nade-dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .nade-dot.smoke { background: var(--smoke); }
  .nade-dot.flash { background: var(--flash); }
  .nade-dot.molotov { background: var(--molotov); }
  .nade-dot.he { background: var(--he); }
  .nade-info { flex: 1; min-width: 0; }
  .nade-title { font-family: 'Rajdhani', sans-serif; font-weight: 600; font-size: 17px; letter-spacing: 0.5px; }
  .nade-desc { font-size: 12px; color: var(--muted); margin-top: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .diff { display: inline-block; font-size: 10px; padding: 2px 8px; border-radius: 99px; font-weight: 500; margin-top: 5px; }
  .diff-easy { background: #0d3320; color: var(--he); }
  .diff-medium { background: #332d00; color: var(--flash); }
  .diff-hard { background: #330d0d; color: var(--molotov); }
  .nade-arrow { color: var(--muted); font-size: 20px; flex-shrink: 0; }

  /* ── VIDEO ── */
  #screen-video { padding-bottom: 30px; }
  .video-wrap { position: relative; width: 100%; padding-top: 56.25%; background: #000; }
  .video-wrap iframe { position: absolute; inset: 0; width: 100%; height: 100%; border: none; }
  .video-info { padding: 16px; }
  .vid-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 22px; letter-spacing: 0.5px; margin-bottom: 8px; }
  .vid-tags { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 14px; }
  .tag { font-size: 11px; padding: 3px 10px; border-radius: 99px; font-weight: 500; }
  .tag-map { background: #1a1a2e; color: #8888ff; }
  .tag-type { font-family: 'Rajdhani', sans-serif; font-weight: 600; }
  .tag-type.smoke { background: #0d1f2e; color: var(--smoke); }
  .tag-type.flash { background: #2e2a00; color: var(--flash); }
  .tag-type.molotov { background: #2e0d0d; color: var(--molotov); }
  .tag-type.he { background: #0d2e1a; color: var(--he); }
  .tip-box { background: var(--card); border: 1px solid var(--border); border-left: 3px solid var(--accent); border-radius: 10px; padding: 14px 16px; font-size: 13px; color: #aaa; line-height: 1.65; margin-bottom: 14px; }
  .tip-box strong { color: var(--accent); display: block; margin-bottom: 5px; font-family: 'Rajdhani', sans-serif; font-size: 13px; letter-spacing: 1px; }
  .yt-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: #ff0000; color: #fff; border: none; border-radius: 10px; padding: 13px; width: 100%; font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 16px; letter-spacing: 1px; cursor: pointer; text-decoration: none; }

  @keyframes slideIn { from { opacity: 0; transform: translateX(16px); } to { opacity: 1; transform: translateX(0); } }
  .screen.active { animation: slideIn 0.18s ease; }
</style>
</head>

function setHeader(showBack, bread='') {
  const btn = document.getElementById('back-btn');
  const logo = document.getElementById('header-logo');
  const bc = document.getElementById('header-bread');
  btn.classList.toggle('visible', showBack);
  if (bread) { logo.style.display='none'; bc.style.display='block'; bc.innerHTML = bread; }
  else { logo.style.display='block'; bc.style.display='none'; }
}

  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  document.getElementById('screen-' + id).scrollTop = 0;
}

function goBack() {
  const prev = stack.pop();
  if (!prev) return;
  if (prev === 'maps') { setHeader(false); showScreen('maps'); }
  else if (prev === 'types') { setHeader(true, MAP_NAMES[currentMap]); showScreen('types'); }
  else if (prev === 'list') { setHeader(true, `${MAP_NAMES[currentMap]} <span>› ${TYPE_NAMES[currentType]}</span>`); showScreen('list'); }
  // stop video
  if (prev !== 'list') document.getElementById('yt-frame').src = '';
}

function selectMap(map) {
  stack.push('maps');
  currentMap = map;
  const mapData = DATA[map];
  document.getElementById('types-label').textContent = MAP_NAMES[map].toUpperCase() + ' — Tipo de granada';
  ['smoke','flash','molotov','he'].forEach(t => {
    document.getElementById('cnt-' + t).textContent = (mapData[t]?.length || 0) + ' lineups';
  });
  setHeader(true, MAP_NAMES[map]);
  showScreen('types');
}

function selectType(type) {
  stack.push('types');
  currentType = type;
  const nades = DATA[currentMap][type] || [];
  document.getElementById('nade-list').innerHTML = nades.map((n, i) => `
    <div class="nade-item" onclick="openNade(${i})">
      <div class="nade-dot ${type}"></div>
      <div class="nade-info">
        <div class="nade-title">${n.title}</div>
        <div class="nade-desc">${n.desc}</div>
        <span class="diff diff-${n.diff}">${DIFF_LABEL[n.diff]}</span>
      </div>
      <div class="nade-arrow">›</div>
    </div>`).join('');
  setHeader(true, `${MAP_NAMES[currentMap]} <span>› ${TYPE_NAMES[type]}</span>`);
  showScreen('list');
}

function openNade(i) {
  stack.push('list');
  currentNade = i;
  const n = DATA[currentMap][currentType][i];
  document.getElementById('vid-title').textContent = n.title;
  document.getElementById('vid-tags').innerHTML = `
    <span class="tag tag-map">${MAP_NAMES[currentMap]}</span>
    <span class="tag tag-type ${currentType}">${TYPE_NAMES[currentType]}</span>
    <span class="diff diff-${n.diff}">${DIFF_LABEL[n.diff]}</span>`;
  document.getElementById('vid-tip').textContent = n.tip;
  document.getElementById('yt-frame').src = `https://www.youtube.com/embed/${n.vid}?autoplay=1&rel=0&playsinline=1`;
  document.getElementById('yt-link').href = `https://www.youtube.com/watch?v=${n.vid}`;
  setHeader(true, `${MAP_NAMES[currentMap]} <span>› ${n.title}</span>`);
  showScreen('video');
}

// PWA service worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
</body>
</html>
